services:
  app:
    build: .
    container_name: video-rag-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./app:/app/app

  qdrant:
    image: qdrant/qdrant:latest
    container_name: video-rag-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_data: